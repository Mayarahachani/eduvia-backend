apiVersion: apps/v1
kind: Deployment
metadata:
  name: eduvia-backend
  namespace: eduvia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eduvia-backend
  template:
    metadata:
      labels:
        app: eduvia-backend
    spec:
      containers:
        - name: backend
          image: mayarahachanipi/eduvia-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: MONGO_URI
              value: mongodb://mongodb:27017/eduvia
            - name: FRONTEND_URL
              value: http://eduvia-frontend
            - name: KEYCLOAK_URL
              value: http://keycloak-service:8080
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: eduvia-backend
  namespace: eduvia
spec:
  selector:
    app: eduvia-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
